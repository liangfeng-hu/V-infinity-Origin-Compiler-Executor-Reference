name: V∞ Demo CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run demo.py
        run: |
          python reference-impl/python/demo.py | tee demo_output.txt

      - name: Sanity check outputs (AuditCard + 4 cases + GateVectorLen=91)
        run: |
          python - <<'PY'
          import re, sys, pathlib
          s = pathlib.Path("demo_output.txt").read_text(encoding="utf-8", errors="ignore")

          required = ["CASE: A_OK", "CASE: B_DISTILL", "CASE: C_THERMO_FORGERY", "CASE: D_DEVICE_HOP"]
          for c in required:
              if c not in s:
                  print("Missing case:", c)
                  sys.exit(1)

          if "AUDIT_CARD:" not in s:
              print("Missing AUDIT_CARD")
              sys.exit(1)

          if "\"result\": \"BLOCK\"" not in s:
              print("Missing BLOCK evidence")
              sys.exit(1)

          if re.search(r'"gatevector_len"\s*:\s*91', s) is None:
              print("Missing gatevector_len=91")
              sys.exit(1)

          print("CI checks passed.")
          PY

      - name: Run minimal_test.py
        run: |
          python examples/minimal_test.py
